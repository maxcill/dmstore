<div class="auth-pagina">
  <div class="auth-card">
    <h1>Entrar na DMstore</h1>
    <p class="auth-subtitulo">Acesse sua conta para continuar comprando.</p>

    <form (ngSubmit)="entrar()" class="auth-form">
      <label>
        E-mail
        <input type="email" [(ngModel)]="email" name="email" required placeholder="voce@email.com" />
      </label>

      <label>
        Senha
        <input type="password" [(ngModel)]="senha" name="senha" required placeholder="••••••••" />
      </label>

      @if (erro()) {
        <p class="auth-erro">{{ erro() }}</p>
      }

      <button type="submit" class="btn btn-primary" [disabled]="carregando()">
        {{ carregando() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-rodape">
      Não tem conta? <a routerLink="/registro">Cadastre-se</a>
    </p>

    <p class="auth-dica">
      Login de teste do administrador: <strong>admin&#64;dmstore.com.br</strong> / <strong>admin123</strong>
    </p>
  </div>
</div>
