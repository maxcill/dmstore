<div class="auth-pagina">
  <div class="auth-card">
    <h1>Criar conta na DMstore</h1>
    <p class="auth-subtitulo">Cadastre-se para comprar e acompanhar seus pedidos.</p>

    <form (ngSubmit)="registrar()" class="auth-form">
      <label>
        Nome completo
        <input type="text" [(ngModel)]="nome" name="nome" required placeholder="Seu nome" />
      </label>

      <label>
        E-mail
        <input type="email" [(ngModel)]="email" name="email" required placeholder="voce@email.com" />
      </label>

      <label>
        Telefone (opcional)
        <input type="tel" [(ngModel)]="telefone" name="telefone" placeholder="(00) 00000-0000" />
      </label>

      <label>
        Senha
        <input type="password" [(ngModel)]="senha" name="senha" required placeholder="Mínimo 6 caracteres" />
      </label>

      @if (erro()) {
        <p class="auth-erro">{{ erro() }}</p>
      }

      <button type="submit" class="btn btn-primary" [disabled]="carregando()">
        {{ carregando() ? 'Criando conta...' : 'Criar conta' }}
      </button>
    </form>

    <p class="auth-rodape">
      Já tem conta? <a routerLink="/login">Entrar</a>
    </p>
  </div>
</div>
